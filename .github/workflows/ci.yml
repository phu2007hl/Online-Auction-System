name: Java CI

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Install Xvfb (virtual display for JavaFX)
        run: sudo apt-get install -y xvfb

      - name: Build and test with virtual display
        run: xvfb-run --auto-servernum mvn clean test -Djava.awt.headless=true